default_config:

frontend:

logger:
  default: info
  logs:
    custom_components.irrigation_computer: debug

# ---------------------------------------------------------------------------
# Mock helpers used by the integration test setup. They expose:
#   - input_number.mock_solar_radiation_w_m2  (slider 0–1200)
#   - sensor.mock_solar_radiation             (template, in W/m²)
#   - input_boolean.mock_relay_a / _b         (manual on/off)
#   - switch.mock_relay_a / _b                (template switches backed by
#                                              the input_booleans, real switch domain)
#   - sensor.mock_relay_a_power / _b_power    (50 W when on, 0 W when off)
#   - input_number.mock_soil_moisture_a / _b  (slider 0–100 %)
#   - sensor.mock_soil_moisture_a / _b        (template, in %)
# ---------------------------------------------------------------------------

input_number:
  mock_solar_radiation_w_m2:
    name: Mock Solar Radiation
    icon: mdi:weather-sunny
    min: 0
    max: 1200
    step: 10
    initial: 0
    unit_of_measurement: "W/m²"
    mode: slider
  mock_soil_moisture_a:
    name: Mock Soil Moisture A
    icon: mdi:water-percent
    min: 0
    max: 100
    step: 1
    initial: 50
    unit_of_measurement: "%"
    mode: slider
  mock_soil_moisture_b:
    name: Mock Soil Moisture B
    icon: mdi:water-percent
    min: 0
    max: 100
    step: 1
    initial: 50
    unit_of_measurement: "%"
    mode: slider

input_boolean:
  mock_relay_a:
    name: Mock Relay A (state)
    icon: mdi:electric-switch
  mock_relay_b:
    name: Mock Relay B (state)
    icon: mdi:electric-switch

template:
  - sensor:
      - name: Mock Solar Radiation
        unique_id: mock_solar_radiation
        unit_of_measurement: "W/m²"
        device_class: irradiance
        state_class: measurement
        state: "{{ states('input_number.mock_solar_radiation_w_m2') | float(0) }}"

      - name: Mock Relay A Power
        unique_id: mock_relay_a_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% if is_state('input_boolean.mock_relay_a', 'on') %}50{% else %}0{% endif %}

      - name: Mock Relay B Power
        unique_id: mock_relay_b_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% if is_state('input_boolean.mock_relay_b', 'on') %}50{% else %}0{% endif %}

      - name: Mock Soil Moisture A
        unique_id: mock_soil_moisture_a
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        state: "{{ states('input_number.mock_soil_moisture_a') | float(0) }}"

      - name: Mock Soil Moisture B
        unique_id: mock_soil_moisture_b
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        state: "{{ states('input_number.mock_soil_moisture_b') | float(0) }}"

  - switch:
      - name: Mock Relay A
        unique_id: mock_relay_a
        state: "{{ is_state('input_boolean.mock_relay_a', 'on') }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.mock_relay_a
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.mock_relay_a
        icon: mdi:water-pump

      - name: Mock Relay B
        unique_id: mock_relay_b
        state: "{{ is_state('input_boolean.mock_relay_b', 'on') }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.mock_relay_b
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.mock_relay_b
        icon: mdi:water-pump
